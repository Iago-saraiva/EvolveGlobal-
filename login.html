<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | EvolveGlobal</title>
  <link rel="stylesheet" href="/css/login-cadastro.css">
</head>
<body>

  <div class="auth-container">
    <div class="auth-box reveal">
      <h2>Bem-vindo de volta</h2>
      <p class="subtitle">Entre na sua conta EvolveGlobal</p>

      <form id="loginForm">
        <div class="input-group">
          <input type="email" id="loginEmail" placeholder="Digite seu e-mail" required>
        </div>

        <div class="input-group">
          <input type="password" id="loginSenha" placeholder="Digite sua senha" required>
        </div>

        <button type="submit" class="btn-auth">Entrar</button>
      </form>

      <p class="switch-page">
        Não tem conta? <a href="cadastro.html">Cadastre-se</a>
      </p>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBot Evolve_Global - Assistente Gemini AI</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .chat-container {
            width: 90%;
            max-width: 600px;
            height: 85vh;
            max-height: 700px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            position: relative;
        }

        .chat-header h2 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .chat-header p {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        .status {
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: #4caf50;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            white-space: nowrap;
        }

        .chat-sidebar {
            display: flex;
            gap: 10px;
            padding: 10px;
            background: #f0f0f0;
            border-bottom: 1px solid #ddd;
        }

        .new-chat-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .chats-list {
            max-height: 150px;
            overflow-y: auto;
            background: #f8f9fa;
            border-bottom: 1px solid #ddd;
            display: none;
        }

        .chats-list.show {
            display: block;
        }

        .chat-item {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-item:hover {
            background: #e9ecef;
        }

        .chat-item.active {
            background: #667eea20;
            border-left: 3px solid #667eea;
        }

        .chat-item-title {
            flex: 1;
            font-size: 0.9rem;
        }

        .delete-chat-btn {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0 5px;
        }

        .delete-chat-btn:hover {
            color: #f44336;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            animation: messageSlide 0.3s ease;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bot .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 12px 16px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #999;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.5;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        .chat-input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
            resize: none;
            font-family: inherit;
        }

        .chat-input:focus {
            border-color: #667eea;
        }

        .send-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            padding: 0 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .send-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .send-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .clear-button {
            background: #f44336;
            color: white;
            border: none;
            border-radius: 25px;
            padding: 0 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.3s;
        }

        .clear-button:hover {
            background: #d32f2f;
        }

        .toggle-chats-btn {
            background: #334155;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 8px 15px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            .chat-container {
                width: 95%;
                height: 90vh;
            }
            .message-content {
                max-width: 85%;
            }
        }
        
        .footer {
            margin-top: 10px;
        }

        .btn-voltar button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.3s;
        }
    </style>
</head>

<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>🤖 Assistente Gemini AI | Evolve Global</h2>
            <p>Powered by Google Gemini 2.5 Flash Lite</p>
            <div class="status" id="statusIndicator">✅ Online</div>
        </div>

        <div class="chat-sidebar">
            <button class="new-chat-btn" id="newChatBtn">+ Nova Conversa</button>
            <button class="toggle-chats-btn" id="toggleChatsBtn">📋 Histórico</button>
        </div>

        <div class="chats-list" id="chatsList">
            <!-- Histórico de chats será carregado aqui -->
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message bot">
                <div class="message-content">
                    Olá! 👋 Sou o Assistente Gemini AI da Evolve Global.<br><br>
                    Como posso ajudar você hoje?<br><br>
                </div>
            </div>
        </div>

        <div class="chat-input-container">
            <textarea class="chat-input" id="messageInput" placeholder="Digite sua mensagem..." rows="1"
                autocomplete="off"></textarea>
            <button class="send-button" id="sendButton">Enviar</button>
            <button class="clear-button" id="clearButton">Limpar</button>
        </div>
    </div>
    <div class="footer">
        <div class="btn-voltar">
            <button onclick="window.location.href='/index.html'">← Voltar</button>
        </div>
    </div>

    <script>
        // Configuração
        const API_URL = 'http://localhost:5000/api';
        
        // Variáveis globais
        let currentChatId = null;
        let chats = [];
        let isTyping = false;
        let lastMessageTime = 0;

        // Elementos
        const messagesContainer = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const clearButton = document.getElementById('clearButton');
        const newChatBtn = document.getElementById('newChatBtn');
        const toggleChatsBtn = document.getElementById('toggleChatsBtn');
        const chatsList = document.getElementById('chatsList');
        const statusIndicator = document.getElementById('statusIndicator');

        // ==================== FUNÇÕES DE API ====================
        async function apiRequest(endpoint, options = {}) {
            const token = localStorage.getItem('token');
            const headers = {
                'Content-Type': 'application/json',
                'Authorization': token,
                ...options.headers
            };
            
            const response = await fetch(`${API_URL}${endpoint}`, {
                ...options,
                headers
            });
            
            if (response.status === 401) {
                window.location.href = 'login.html';
                throw new Error('Sessão expirada');
            }
            
            return response;
        }

        // ==================== CHATS ====================
        async function loadChats() {
            try {
                const response = await apiRequest('/chat/chats');
                chats = await response.json();
                renderChatsList();
                
                if (chats.length === 0) {
                    await createNewChat();
                } else if (!currentChatId) {
                    await loadChatMessages(chats[0].id);
                }
            } catch (error) {
                console.error('Erro ao carregar chats:', error);
            }
        }

        async function createNewChat() {
            try {
                const response = await apiRequest('/chat/chats', {
                    method: 'POST',
                    body: JSON.stringify({ titulo: 'Nova Conversa' })
                });
                const data = await response.json();
                await loadChats();
                await loadChatMessages(data.id);
            } catch (error) {
                console.error('Erro ao criar chat:', error);
            }
        }

        async function loadChatMessages(chatId) {
            try {
                const response = await apiRequest(`/chat/chats/${chatId}/mensagens`);
                const mensagens = await response.json();
                
                currentChatId = chatId;
                messagesContainer.innerHTML = '';
                
                if (mensagens.length === 0) {
                    addMessage('Olá! 👋 Sou o Assistente Gemini AI da Evolve Global.\n\nComo posso ajudar você hoje?', 'bot');
                } else {
                    mensagens.forEach(msg => {
                        addMessage(msg.content, msg.role);
                    });
                }
                
                highlightActiveChat();
                scrollToBottom();
            } catch (error) {
                console.error('Erro ao carregar mensagens:', error);
            }
        }

        async function sendMessageToBot(message) {
            try {
                const response = await apiRequest('/chat/send', {
                    method: 'POST',
                    body: JSON.stringify({
                        message: message,
                        chat_id: currentChatId
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    if (!currentChatId) {
                        currentChatId = data.chat_id;
                        await loadChats();
                    }
                    return data.response;
                } else {
                    throw new Error(data.error || 'Erro ao enviar mensagem');
                }
            } catch (error) {
                console.error('Erro ao enviar mensagem:', error);
                throw error;
            }
        }

        async function deleteChat(chatId) {
            if (!confirm('Tem certeza que deseja excluir esta conversa?')) return;
            
            try {
                await apiRequest(`/chat/chats/${chatId}`, { method: 'DELETE' });
                await loadChats();
                
                if (chats.length > 0) {
                    await loadChatMessages(chats[0].id);
                } else {
                    await createNewChat();
                }
            } catch (error) {
                console.error('Erro ao deletar chat:', error);
            }
        }

        // ==================== UI FUNCTIONS ====================
        function renderChatsList() {
            chatsList.innerHTML = '';
            chats.forEach(chat => {
                const chatItem = document.createElement('div');
                chatItem.className = 'chat-item';
                chatItem.dataset.id = chat.id;
                chatItem.innerHTML = `
                    <div class="chat-item-title">${chat.titulo}</div>
                    <button class="delete-chat-btn" data-id="${chat.id}">🗑️</button>
                `;
                chatItem.querySelector('.chat-item-title').onclick = () => loadChatMessages(chat.id);
                chatItem.querySelector('.delete-chat-btn').onclick = (e) => {
                    e.stopPropagation();
                    deleteChat(chat.id);
                };
                chatsList.appendChild(chatItem);
            });
        }

        function highlightActiveChat() {
            document.querySelectorAll('.chat-item').forEach(item => {
                item.classList.remove('active');
                if (item.dataset.id == currentChatId) {
                    item.classList.add('active');
                }
            });
        }

        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            let formattedText = text.replace(/\n/g, '<br>');
            formattedText = formattedText.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color:#667eea;">$1</a>');
            contentDiv.innerHTML = formattedText;

            messageDiv.appendChild(contentDiv);
            messagesContainer.appendChild(messageDiv);
            scrollToBottom();
            return messageDiv;
        }

        function showTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot';
            typingDiv.id = 'typingIndicator';
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
            typingDiv.appendChild(contentDiv);
            messagesContainer.appendChild(typingDiv);
            scrollToBottom();
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function clearChat() {
            if (confirm('Limpar todas as mensagens desta conversa?')) {
                messagesContainer.innerHTML = '';
                addMessage('💬 Chat limpo! Como posso ajudar você hoje?', 'bot');
            }
        }

        // ==================== SEND MESSAGE ====================
        async function sendMessage() {
            const message = messageInput.value.trim();

            if (!message) return;
            if (isTyping) return;

            const now = Date.now();
            const timeSinceLastMessage = (now - lastMessageTime) / 1000;
            
            if (lastMessageTime > 0 && timeSinceLastMessage < 15) {
                const remainingWait = Math.ceil(15 - timeSinceLastMessage);
                addMessage(`⏳ Aguarde ${remainingWait} segundos entre as mensagens.`, 'bot');
                return;
            }

            // Mostrar mensagem do usuário
            addMessage(message, 'user');
            messageInput.value = '';
            messageInput.style.height = 'auto';

            showTypingIndicator();
            isTyping = true;
            sendButton.disabled = true;

            try {
                const response = await sendMessageToBot(message);
                removeTypingIndicator();
                addMessage(response, 'bot');
                lastMessageTime = Date.now();
                
                // Recarregar chats para atualizar título se necessário
                await loadChats();
            } catch (error) {
                removeTypingIndicator();
                addMessage(`❌ ${error.message}`, 'bot');
            } finally {
                isTyping = false;
                sendButton.disabled = false;
                scrollToBottom();
            }
        }

        // ==================== EVENTOS ====================
        newChatBtn.onclick = createNewChat;
        clearButton.onclick = clearChat;
        sendButton.onclick = sendMessage;
        
        toggleChatsBtn.onclick = () => {
            chatsList.classList.toggle('show');
            toggleChatsBtn.textContent = chatsList.classList.contains('show') ? '📋 Ocultar' : '📋 Histórico';
        };

        messageInput.onkeypress = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        };

        messageInput.oninput = () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = Math.min(messageInput.scrollHeight, 100) + 'px';
        };

        // ==================== VERIFICAR LOGIN ====================
        async function checkLogin() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
                return false;
            }
            
            try {
                const response = await fetch(`${API_URL}/verificar-token`, {
                    headers: { 'Authorization': token }
                });
                
                if (!response.ok) {
                    window.location.href = 'login.html';
                    return false;
                }
                
                return true;
            } catch (error) {
                window.location.href = 'login.html';
                return false;
            }
        }

        // ==================== INICIAR ====================
        async function init() {
            const loggedIn = await checkLogin();
            if (!loggedIn) return;
            
            await loadChats();
        }
        
        init();
    </script>
</body>

</html>

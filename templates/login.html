<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | EvolveGlobal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Arial', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0a0f2c, #111c44, #1a2a6c);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      padding: 20px;
    }

    .auth-container {
      width: 100%;
      max-width: 450px;
      padding: 20px;
    }

    .auth-box {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 40px 30px;
      box-shadow: 0 10px 35px rgba(0, 0, 0, 0.35);
      text-align: center;
      transition: all 0.4s ease;
    }

    .auth-box:hover {
      transform: translateY(-5px);
      box-shadow: 0 14px 45px rgba(0, 0, 0, 0.45);
    }

    .auth-box h2 {
      font-size: 2rem;
      margin-bottom: 10px;
      color: #ffffff;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #d8e2ff;
      margin-bottom: 25px;
    }

    .input-group {
      margin-bottom: 18px;
    }

    .input-group input {
      width: 100%;
      padding: 14px 16px;
      border: none;
      outline: none;
      border-radius: 12px;
      font-size: 1rem;
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      border: 1px solid transparent;
      transition: 0.3s ease;
    }

    .input-group input::placeholder {
      color: #d3dbf7;
    }

    .input-group input:focus {
      border: 1px solid #4facfe;
      background: rgba(255, 255, 255, 0.18);
      box-shadow: 0 0 10px rgba(79, 172, 254, 0.4);
    }

    .btn-auth {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(90deg, #4facfe, #00f2fe);
      color: #fff;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s ease;
      margin-top: 10px;
    }

    .btn-auth:hover {
      transform: scale(1.03);
      box-shadow: 0 8px 20px rgba(79, 172, 254, 0.35);
    }

    .btn-auth:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .switch-page {
      margin-top: 20px;
      font-size: 0.95rem;
      color: #d8e2ff;
    }

    .switch-page a {
      color: #4facfe;
      text-decoration: none;
      font-weight: bold;
    }

    .switch-page a:hover {
      text-decoration: underline;
    }

    .error-message {
      background: rgba(255, 68, 68, 0.2);
      border: 1px solid rgba(255, 68, 68, 0.5);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 20px;
      color: #ff8888;
      font-size: 0.9rem;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: all 0.8s ease;
    }

    .reveal.active {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 480px) {
      .auth-box {
        padding: 30px 20px;
      }

      .auth-box h2 {
        font-size: 1.6rem;
      }

      .subtitle {
        font-size: 0.9rem;
      }
    }
  </style>
</head>

<body>
  <div class="auth-container">
    <div class="auth-box reveal">
      <h2>Bem-vindo de volta</h2>
      <p class="subtitle">Faça login na EvolveGlobal</p>

      <div id="errorMessage" class="error-message"></div>

      <form id="loginForm">
        <div class="input-group">
          <input type="email" id="loginEmail" placeholder="Digite seu e-mail" required autocomplete="email">
        </div>

        <div class="input-group">
          <input type="password" id="loginSenha" placeholder="Digite sua senha" required
            autocomplete="current-password">
        </div>

        <button type="submit" class="btn-auth" id="loginButton">Entrar</button>
      </form>

      <p class="switch-page">
        Não tem conta? <a href="cadastro.html">Criar conta</a>
      </p>
    </div>
  </div>

  <script>
    // ============================================
    // CONFIGURAÇÃO DA API
    // ============================================
    const API_URL = 'http://localhost:5000/api';

    // ============================================
    // ANIMAÇÕES
    // ============================================
    const revealElements = document.querySelectorAll(".reveal");

    function revealOnScroll() {
      const triggerBottom = window.innerHeight - 100;
      revealElements.forEach((element) => {
        const elementTop = element.getBoundingClientRect().top;
        if (elementTop < triggerBottom) {
          element.classList.add("active");
        }
      });
    }

    window.addEventListener("scroll", revealOnScroll);
    window.addEventListener("load", revealOnScroll);

    // ============================================
    // FUNÇÃO PARA MOSTRAR ERRO
    // ============================================
    function showError(message) {
      const errorDiv = document.getElementById("errorMessage");
      errorDiv.textContent = message;
      errorDiv.classList.add("show");

      // Esconder erro após 5 segundos
      setTimeout(() => {
        errorDiv.classList.remove("show");
      }, 5000);
    }

    // ============================================
    // FUNÇÃO PARA ESCONDER ERRO
    // ============================================
    function hideError() {
      const errorDiv = document.getElementById("errorMessage");
      errorDiv.classList.remove("show");
    }

    // ============================================
    // LOGIN
    // ============================================
    const loginForm = document.getElementById("loginForm");
    const loginButton = document.getElementById("loginButton");

    if (loginForm) {
      loginForm.addEventListener("submit", async function (e) {
        e.preventDefault();
        hideError();

        const email = document.getElementById("loginEmail").value.trim();
        const senha = document.getElementById("loginSenha").value.trim();

        // Validação dos campos
        if (!email || !senha) {
          showError("Por favor, preencha todos os campos!");
          return;
        }

        if (!email.includes('@')) {
          showError("Por favor, digite um e-mail válido!");
          return;
        }

        if (senha.length < 6) {
          showError("A senha deve ter pelo menos 6 caracteres!");
          return;
        }

        // Desabilitar botão durante o login
        loginButton.disabled = true;
        loginButton.innerHTML = '<span class="loading"></span> Entrando...';

        try {
          console.log("Tentando login com:", { email, senha: "***" });

          const response = await fetch(`${API_URL}/login`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ email, senha })
          });

          const data = await response.json();
          console.log("Resposta do servidor:", data);

          if (response.ok && data.success) {
            // Salvar token e dados do usuário
            localStorage.setItem("token", data.token);
            localStorage.setItem("user", JSON.stringify(data.user));
            localStorage.setItem("logado", "true"); // Para compatibilidade com o index.html antigo

            console.log("Dados salvos com sucesso!");
            console.log("Token:", localStorage.getItem("token"));
            console.log("User:", localStorage.getItem("user"));

            // Redirecionar para o index
            window.location.href = "/index.html";
          } else {
            // Mostrar erro do servidor
            showError(data.error || "Email ou senha incorretos!");
            loginButton.disabled = false;
            loginButton.innerHTML = 'Entrar';
          }
        } catch (error) {
          console.error("Erro detalhado:", error);

          // Verificar se é erro de conexão
          if (error.message.includes("Failed to fetch") || error.message.includes("NetworkError")) {
            showError("Erro de conexão com o servidor. Verifique se o backend está rodando em http://localhost:5000");
          } else {
            showError("Erro ao fazer login. Tente novamente mais tarde.");
          }

          loginButton.disabled = false;
          loginButton.innerHTML = 'Entrar';
        }
      });
    }

    // ============================================
    // VERIFICAR SE JÁ ESTÁ LOGADO
    // ============================================
    async function verificarSessao() {
      const token = localStorage.getItem("token");

      if (token && !window.location.pathname.includes("login.html")) {
        try {
          const response = await fetch(`${API_URL}/verificar-token`, {
            headers: {
              'Authorization': token,
              'Content-Type': 'application/json'
            }
          });

          if (response.ok) {
            // Token válido, redirecionar para o index se estiver na página de login
            if (window.location.pathname.includes("login.html") || window.location.pathname.includes("cadastro.html")) {
              window.location.href = "/index.html";
            }
          } else {
            // Token inválido, limpar localStorage
            localStorage.removeItem("token");
            localStorage.removeItem("user");
            localStorage.removeItem("logado");
          }
        } catch (error) {
          console.error("Erro ao verificar token:", error);
          // Se o backend estiver offline, ainda assim permitir acesso se tiver token
          if (window.location.pathname.includes("login.html") || window.location.pathname.includes("cadastro.html")) {
            // Não redirecionar se o backend estiver offline
            console.warn("Backend offline, continuando na página de login");
          }
        }
      }
    }

    // Verificar sessão ao carregar a página
    verificarSessao();

    // ============================================
    // TESTE DE CONEXÃO COM O BACKEND
    // ============================================
    async function testarConexao() {
      try {
        const response = await fetch(`${API_URL}/teste`);
        const data = await response.json();
        console.log("✅ Conexão com backend estabelecida:", data);
      } catch (error) {
        console.warn("⚠️ Backend não está rodando em", API_URL);
        console.warn("Inicie o backend com: python app.py");
      }
    }

    // Testar conexão ao carregar
    testarConexao();

    // ============================================
    // ADICIONAR EVENTO DE TECLA ENTER
    // ============================================
    const inputs = document.querySelectorAll('input');
    inputs.forEach(input => {
      input.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          if (loginForm) {
            loginForm.dispatchEvent(new Event('submit'));
          }
        }
      });
    });
  </script>
</body>

</html>

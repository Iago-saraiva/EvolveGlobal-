<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolve Code Studio - VS Code Style</title>
    <style>
        /* ==================== VS CODE DARK MODERN THEME ==================== */
        :root {
            --vsc-bg: #1e1e1e;
            --vsc-sidebar: #252526;
            --vsc-activity-bar: #2d2d2d;
            --vsc-editor-bg: #1e1e1e;
            --vsc-tab-bg: #2d2d2d;
            --vsc-tab-border: #3e3e42;
            --vsc-line-number: #858585;
            --vsc-selection: #264f78;
            --vsc-folder: #dcb67a;
            --vsc-file: #9cdcfe;
            --vsc-terminal-bg: #0c0c0c;
            --vsc-button-bg: #0e639c;
            --vsc-button-hover: #1177bb;
            --vsc-scrollbar: #424242;
            --vsc-scrollbar-hover: #686868;
            --vsc-hover: #2a2d2e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: var(--vsc-bg);
            color: #cccccc;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ==================== HEADER ==================== */
        header {
            background: var(--vsc-activity-bar);
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #3e3e42;
            height: 48px;
        }

        header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #007acc;
            letter-spacing: 0.5px;
        }

        header h1::before {
            content: "▼ ";
            font-size: 12px;
            color: #007acc;
        }

        .top-buttons {
            display: flex;
            gap: 8px;
        }

        button,
        select {
            background: var(--vsc-button-bg);
            border: none;
            color: white;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        button:hover,
        select:hover {
            background: var(--vsc-button-hover);
            transform: none;
        }

        .danger-btn {
            background: #a1260d;
        }

        .danger-btn:hover {
            background: #c42e11;
        }

        .warning-btn {
            background: #b89500;
        }

        .warning-btn:hover {
            background: #d4aa00;
        }

        .success-btn {
            background: #0e639c;
        }

        .success-btn:hover {
            background: #1177bb;
        }

        .secondary-btn {
            background: #3e3e42;
        }

        .secondary-btn:hover {
            background: #4e4e53;
        }

        /* ==================== USER INFO ==================== */
        #user-info {
            position: absolute;
            top: 8px;
            right: 16px;
            background: #2d2d2d;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 100;
        }

        #user-info button {
            background: #a1260d;
            padding: 4px 10px;
            font-size: 11px;
        }

        /* ==================== PROJECT NAV ==================== */
        .project-nav {
            background: var(--vsc-tab-bg);
            padding: 6px 16px;
            display: flex;
            gap: 8px;
            align-items: center;
            border-bottom: 1px solid var(--vsc-tab-border);
            height: 48px;
        }

        .project-nav select {
            background: #3c3c3c;
            min-width: 180px;
        }

        .project-name-badge {
            background: #3c3c3c;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-family: monospace;
            margin-left: auto;
        }

        /* ==================== MAIN LAYOUT ==================== */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ==================== SIDEBAR ==================== */
        .sidebar {
            width: 260px;
            background: var(--vsc-sidebar);
            display: flex;
            flex-direction: column;
            border-right: 1px solid #3e3e42;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 10px 16px;
            background: #2d2d2d;
            border-bottom: 1px solid #3e3e42;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #bbbbbb;
        }

        .sidebar-header h3 {
            font-size: 11px;
            margin-bottom: 8px;
            color: #cccccc;
        }

        .sidebar-actions-row {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .sidebar-actions-row button {
            background: #3c3c3c;
            padding: 5px 10px;
            font-size: 11px;
        }

        .file-tree {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        /* Árvore de arquivos estilo VS Code */
        .tree-item {
            margin: 0;
            border-radius: 0;
            background: transparent;
        }

        .tree-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 8px 4px 16px;
            cursor: pointer;
            transition: background 0.1s;
        }

        .tree-row:hover {
            background: var(--vsc-hover);
        }

        .tree-label {
            flex: 1;
            font-size: 13px;
            font-family: 'Segoe UI', monospace;
        }

        .tree-folder .tree-label {
            color: var(--vsc-folder);
            font-weight: normal;
        }

        .tree-file .tree-label {
            color: var(--vsc-file);
        }

        .tree-file.active {
            background: var(--vsc-selection);
        }

        .tree-actions {
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: opacity 0.1s;
        }

        .tree-row:hover .tree-actions {
            opacity: 1;
        }

        .mini-btn {
            background: #3c3c3c;
            padding: 2px 6px;
            font-size: 10px;
            border-radius: 3px;
        }

        .mini-danger {
            background: #a1260d;
        }

        .mini-warning {
            background: #b89500;
        }

        .folder-files {
            padding-left: 24px;
        }

        /* ==================== EDITOR + PREVIEW ==================== */
        .editor-preview-wrapper {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Editor Section */
        .editor-section {
            width: 50%;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #3e3e42;
            background: var(--vsc-editor-bg);
        }

        .editor-header {
            background: var(--vsc-tab-bg);
            padding: 8px 12px;
            border-bottom: 1px solid #3e3e42;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .editor-file-name {
            font-size: 13px;
            font-weight: 500;
            color: #cccccc;
            font-family: monospace;
        }

        .editor-meta {
            font-size: 11px;
            color: #858585;
            margin-top: 2px;
        }

        .editor-actions {
            display: flex;
            gap: 8px;
        }

        textarea {
            flex: 1;
            width: 100%;
            resize: none;
            border: none;
            outline: none;
            padding: 16px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
            background: var(--vsc-editor-bg);
            color: #d4d4d4;
            tab-size: 4;
        }

        textarea:focus {
            outline: none;
        }

        /* Preview Section */
        .preview-section {
            width: 50%;
            display: flex;
            flex-direction: column;
            background: white;
        }

        .preview-header {
            background: var(--vsc-tab-bg);
            padding: 8px 12px;
            border-bottom: 1px solid #3e3e42;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .preview-header h3 {
            font-size: 12px;
            font-weight: 500;
            color: #cccccc;
        }

        iframe {
            flex: 1;
            width: 100%;
            border: none;
            background: white;
        }

        /* ==================== TERMINAL ==================== */
        .terminal-panel {
            background: var(--vsc-terminal-bg);
            border-top: 1px solid #3e3e42;
            display: none;
            flex-direction: column;
            height: 280px;
        }

        .terminal-panel.active {
            display: flex;
        }

        .terminal-header {
            background: #2d2d2d;
            padding: 6px 12px;
            border-bottom: 1px solid #3e3e42;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .terminal-title {
            color: #22c55e;
            font-size: 12px;
            font-weight: 500;
            font-family: monospace;
        }

        .terminal-actions button {
            padding: 4px 10px;
            font-size: 11px;
        }

        .terminal-output {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            line-height: 1.5;
            color: #cccccc;
        }

        .terminal-line {
            margin-bottom: 4px;
        }

        .terminal-success {
            color: #22c55e;
        }

        .terminal-error {
            color: #ef4444;
        }

        .terminal-info {
            color: #38bdf8;
        }

        /* ==================== BOTTOM ACTIONS ==================== */
        .bottom-actions {
            background: var(--vsc-tab-bg);
            padding: 6px 16px;
            display: flex;
            gap: 8px;
            align-items: center;
            border-top: 1px solid #3e3e42;
            height: 44px;
        }

        #statusBar {
            margin-left: auto;
            font-size: 11px;
            color: #858585;
            font-family: monospace;
        }

        /* ==================== SCROLLBAR ==================== */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #1e1e1e;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--vsc-scrollbar);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--vsc-scrollbar-hover);
        }

        /* ==================== MODAL ==================== */
        .user-info_modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #252526;
            border-radius: 8px;
            padding: 24px;
            width: 90%;
            max-width: 380px;
            z-index: 1000;
            display: none;
            color: #cccccc;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .user-info_modal.show {
            display: block;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 999;
            display: none;
        }

        .modal-overlay.show {
            display: block;
        }

        .user-info_modal .user-name {
            text-align: center;
            margin-bottom: 16px;
        }

        .user-info_modal .user-name span {
            font-size: 20px;
            font-weight: 600;
            color: #007acc;
        }

        .user-info_modal .user-image {
            text-align: center;
            margin-bottom: 16px;
        }

        .user-info_modal .user-image img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid #007acc;
        }

        .user-info_modal .user-info p {
            margin: 8px 0;
            color: #cccccc;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .close-modal {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #a1260d;
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        .debug-panel {
            position: fixed;
            bottom: 12px;
            left: 12px;
            background: #2d2d2d;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 10px;
            cursor: pointer;
            opacity: 0.6;
            z-index: 999;
            font-family: monospace;
        }

        .debug-panel:hover {
            opacity: 1;
        }

        /* ==================== LOGIN OVERLAY ==================== */
        .login-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .login-message {
            background: #252526;
            padding: 32px;
            border-radius: 8px;
            text-align: center;
            max-width: 380px;
            border: 1px solid #3e3e42;
        }

        .login-message h2 {
            color: #007acc;
            margin-bottom: 16px;
        }

        .login-message p {
            margin-bottom: 20px;
            color: #cccccc;
        }

        .login-message button {
            background: #0e639c;
            padding: 8px 20px;
        }

        .hidden {
            display: none;
        }

        /* ==================== RESPONSIVIDADE ==================== */
        @media (max-width: 1200px) {
            .main-layout {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                max-height: 200px;
            }

            .editor-preview-wrapper {
                flex-direction: column;
            }

            .editor-section,
            .preview-section {
                width: 100%;
                height: 50vh;
            }

            header,
            .project-nav {
                padding: 6px 12px;
            }

            button,
            select {
                padding: 4px 10px;
                font-size: 12px;
            }
        }

        @media (max-width: 768px) {
            .project-nav select {
                min-width: 120px;
            }

            .project-name-badge {
                font-size: 10px;
            }

            .tree-label {
                font-size: 11px;
            }

            textarea {
                font-size: 12px;
            }

            .editor-actions {
                flex-wrap: wrap;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>Evolve Code Studio</h1>
        <div class="top-buttons">
            <button onclick="window.location.href='/index.html'">← Voltar</button>
            <button id="newProjectBtn">Novo Projeto</button>
            <button id="renameProjectBtn">Renomear</button>
            <button id="deleteProjectBtn" class="danger-btn">Excluir</button>
            <button id="openUserModalBtn">👤 Info</button>
        </div>
    </header>

    <!-- <div id="user-info" class="hidden"></div> -->

    <div class="project-nav">
        <button id="prevProjectBtn">⬅ Anterior</button>
        <select id="projectSelector"></select>
        <button id="nextProjectBtn">Próximo ➡</button>
        <span class="project-name-badge" id="currentProjectBadge">Carregando...</span>
        <button id="createFileBtn" class="secondary-btn">📄 Novo Arquivo</button>
        <button id="createFolderBtn" class="secondary-btn">📁 Nova Pasta</button>
    </div>

    <div class="main-layout">
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>EXPLORADOR</h3>
                <div class="sidebar-actions-row">
                    <button id="createFolderBtnSidebar" class="mini-btn">📁 Nova Pasta</button>
                    <button id="createFileBtnSidebar" class="mini-btn">📄 Novo Arquivo</button>
                </div>
            </div>
            <div id="fileTree" class="file-tree"></div>
        </div>

        <div class="editor-preview-wrapper">
            <div class="editor-section">
                <div class="editor-header">
                    <div>
                        <div class="editor-file-name" id="currentFileName">Nenhum arquivo</div>
                        <div class="editor-meta" id="currentFileMeta">Selecione um arquivo</div>
                    </div>
                    <div class="editor-actions">
                        <button id="renameFileBtn" class="warning-btn">✏️ Renomear</button>
                        <button id="deleteFileBtn" class="danger-btn">🗑️ Excluir</button>
                        <button id="openTerminalBtn" class="success-btn">🐍 Terminal</button>
                    </div>
                </div>
                <textarea id="codeEditor" spellcheck="false" placeholder="Selecione ou crie um arquivo..."></textarea>
                <div id="terminalPanel" class="terminal-panel">
                    <div class="terminal-header">
                        <span class="terminal-title">🐍 TERMINAL PYTHON</span>
                        <div class="terminal-actions">
                            <button id="runPythonBtn" class="success-btn">▶ Rodar</button>
                            <button id="clearTerminalBtn" class="secondary-btn">Limpar</button>
                            <button id="closeTerminalBtn" class="danger-btn">Fechar</button>
                        </div>
                    </div>
                    <div id="terminalOutput" class="terminal-output">
                        <div class="terminal-line terminal-info">🐍 Terminal Python pronto</div>
                    </div>
                </div>
            </div>

            <div class="preview-section">
                <div class="preview-header">
                    <h3>🔍 PREVIEW</h3>
                    <div>
                        <button id="refreshPreviewBtn">🔄 Atualizar</button>
                        <button id="openMainFilesBtn" class="secondary-btn">📄 Arquivos Principais</button>
                    </div>
                </div>
                <iframe id="preview" title="Preview"
                    sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
            </div>
        </div>
    </div>

    <div class="bottom-actions">
        <button id="runBtn">▶ Executar</button>
        <button id="copyBtn">📋 Copiar</button>
        <button id="clearBtn" class="danger-btn">🗑️ Limpar</button>
        <button id="resetBtn" class="danger-btn">🔄 Resetar Projeto</button>
        <div id="statusBar">Ln 1, Col 1 UTF-8 </div>
    </div>

    <div class="modal-overlay" id="modalOverlay"></div>
    <div class="user-info_modal" id="userModal">
        <button class="close-modal" id="closeModalBtn">×</button>
        <div class="user-name"><span id="userNameDisplay"></span></div>
        <div class="user-image"><img id="userImageDisplay" src="" alt="User"></div>
        <div class="user-info">
            <p id="userEmailDisplay"></p>
        </div>
    </div>

    <script src="../js/editor.js"></script>
</body>

</html>
